name: Apply onboarding branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-onboarding-branch.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout onboarding branch
        uses: actions/checkout@v4
        with:
          ref: agent/onboarding-flexible-payments
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply guarded onboarding changes
        run: python3 scripts/apply-flexible-onboarding-v2.py

      - name: Install dependencies
        run: npm ci

      - name: Lint changed application files
        run: npx eslint src/components/dashboard/create-flow-dialog.tsx src/app/api/workflows/create-from-template/route.ts src/lib/flow-templates.ts src/app/dashboard/flujos/page.tsx

      - name: Build production application
        run: npm run build

      - name: Check patch formatting
        run: git diff --check

      - name: Commit validated onboarding
        run: |
          rm -f scripts/apply-flexible-onboarding.mjs
          rm -f scripts/apply-flexible-onboarding-v2.py
          rm -f scripts/.onboarding-trigger
          rm -f .github/workflows/apply-flexible-onboarding.yml
          rm -f .github/workflows/onboarding-pull-request.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Improve onboarding with flexible payment providers"
          git push origin HEAD:agent/onboarding-flexible-payments
