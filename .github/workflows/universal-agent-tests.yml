name: Universal Agent Tests

on:
  pull_request:
    paths:
      - "src/lib/engine-universal*.ts"
      - "src/lib/universal-*.ts"
      - "tests/universal-agent-*.test.mjs"
      - ".github/workflows/universal-agent-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  universal-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run universal agent contracts
        run: bun test tests/universal-agent-contract.test.mjs tests/universal-agent-scenarios.test.mjs
