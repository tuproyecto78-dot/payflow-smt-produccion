name: Voice runtime check

on:
  pull_request:
    paths:
      - "services/voice-runtime/**"
      - "src/lib/voice/**"
      - "src/app/api/voice/**"
      - "supabase/migrations/*voice*"
      - ".github/workflows/voice-runtime-check.yml"
  push:
    branches:
      - feature/telnyx-inbound-voice-orders
    paths:
      - "services/voice-runtime/**"
      - "src/lib/voice/**"
      - "src/app/api/voice/**"
      - "supabase/migrations/*voice*"
      - ".github/workflows/voice-runtime-check.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/voice-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/voice-runtime/package-lock.json
      - name: Install
        run: npm ci
      - name: TypeScript and tests
        run: |
          set -o pipefail
          npm run check 2>&1 | tee voice-runtime-check.log
      - name: Upload check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-runtime-check-log
          path: services/voice-runtime/voice-runtime-check.log
          if-no-files-found: warn
          retention-days: 3
